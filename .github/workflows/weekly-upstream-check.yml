name: Weekly upstream check

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve upstream from fork metadata
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          repo_json=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${GITHUB_REPOSITORY}")
          upstream_full=$(printf '%s' "$repo_json" | python3 -c 'import sys,json; d=json.load(sys.stdin); print((d.get("parent") or {}).get("full_name") or "")')
          upstream_branch=$(printf '%s' "$repo_json" | python3 -c 'import sys,json; d=json.load(sys.stdin); print((d.get("parent") or {}).get("default_branch") or "")')
          base_branch=$(printf '%s' "$repo_json" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("default_branch") or "")')
          if [ -z "$upstream_full" ] || [ -z "$upstream_branch" ] || [ -z "$base_branch" ]; then
            echo "Missing metadata; skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "upstream_full=$upstream_full" >> "$GITHUB_OUTPUT"
          echo "upstream_branch=$upstream_branch" >> "$GITHUB_OUTPUT"
          echo "base_branch=$base_branch" >> "$GITHUB_OUTPUT"
          echo "sync_branch=chore/weekly-upstream-sync" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Prepare sync branch
        if: steps.meta.outputs.skip == 'false'
        id: sync
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "${{ steps.meta.outputs.base_branch }}" --no-tags
          git remote add upstream "https://github.com/${{ steps.meta.outputs.upstream_full }}.git" || git remote set-url upstream "https://github.com/${{ steps.meta.outputs.upstream_full }}.git"
          git fetch upstream "${{ steps.meta.outputs.upstream_branch }}" --no-tags
          git checkout -B "${{ steps.meta.outputs.sync_branch }}" "origin/${{ steps.meta.outputs.base_branch }}"
          if git merge-base --is-ancestor "upstream/${{ steps.meta.outputs.upstream_branch }}" HEAD; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git merge --no-edit "upstream/${{ steps.meta.outputs.upstream_branch }}"
          if git diff --quiet "origin/${{ steps.meta.outputs.base_branch }}...HEAD"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git push --force-with-lease origin "${{ steps.meta.outputs.sync_branch }}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create or find pull request
        if: steps.sync.outputs.changed == 'true'
        id: pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const base = `${{ steps.meta.outputs.base_branch }}`;
            const head = `${owner}:${{ steps.meta.outputs.sync_branch }}`;
            const existing = await github.rest.pulls.list({ owner, repo, state: 'open', head, base });
            let pr;
            if (existing.data.length > 0) {
              pr = existing.data[0];
            } else {
              pr = (await github.rest.pulls.create({
                owner,
                repo,
                title: 'chore: weekly upstream sync',
                head: `${{ steps.meta.outputs.sync_branch }}`,
                base,
                body: `Weekly automated upstream update check.

- Upstream: \`${{ steps.meta.outputs.upstream_full }}\`
- Upstream branch: \`${{ steps.meta.outputs.upstream_branch }}\``
              })).data;
            }
            core.setOutput('pulls_url', `https://github.com/${owner}/${repo}/pulls`);
            core.setOutput('pr_url', pr.html_url);

      - name: Notify Telegram on PR created
        if: steps.sync.outputs.changed == 'true'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" --data-urlencode "text=${{ github.repository }} 检测到上游更新并已创建 PR%0A上游: ${{ steps.meta.outputs.upstream_full }}%0APR 列表: https://github.com/${{ github.repository }}/pulls"
